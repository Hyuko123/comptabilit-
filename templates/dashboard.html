<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .sidebar-link { @apply flex items-center gap-4 px-6 py-4 text-[#ad1457] font-semibold transition-all rounded-2xl mx-4; }
        .sidebar-link:hover { @apply bg-pink-50 translate-x-2; }
        .card { @apply bg-white border border-pink-50 rounded-[35px] p-8 shadow-sm; }
    </style>
</head>
<body class="flex min-h-screen bg-[#fffafb]">

    <aside class="w-80 bg-white border-r border-pink-100 flex flex-col py-10">
        <div class="px-10 mb-12">
            <h2 class="text-2xl font-black text-[#f06292] italic italic tracking-tighter">ULTRAZE V2</h2>
        </div>

        <nav class="flex-1 space-y-1">
            <a href="/dashboard" class="sidebar-link bg-pink-100/50"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="/ventes" class="sidebar-link"><i class="fa-solid fa-cart-shopping"></i> Ventes</a>
            <a href="/salaires" class="sidebar-link"><i class="fa-solid fa-hand-holding-dollar"></i> Salaires</a>
            <a href="/utilisateurs" class="sidebar-link"><i class="fa-solid fa-users-gear"></i> Utilisateurs</a>
            <a href="/stocks" class="sidebar-link"><i class="fa-solid fa-box-open"></i> Stocks / Produits</a>
            <div class="h-[1px] bg-pink-50 my-6 mx-8"></div>
            <a href="/clotures" class="sidebar-link text-pink-400"><i class="fa-solid fa-file-invoice-dollar"></i> Clôtures Hebdo</a>
            <a href="/irs" class="sidebar-link text-red-400"><i class="fa-solid fa-triangle-exclamation"></i> Alertes IRS</a>
        </nav>
    </aside>

    <main class="flex-1 p-12">
        <header class="flex justify-between items-center mb-16">
            <h1 class="text-4xl font-light text-[#880e4f]">Interface <span class="font-bold">Premium</span></h1>
            <div class="text-right">
                <p class="text-xs font-bold text-pink-300 uppercase tracking-widest">Shinoza Corporate</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="card">
                <p class="text-[10px] font-bold text-pink-300 uppercase mb-4 tracking-widest">CA Total Entreprises</p>
                <h3 class="text-5xl font-light text-[#ad1457]">0 <span class="text-lg">$</span></h3>
            </div>
            </div>
    </main>
</body>
</html>
