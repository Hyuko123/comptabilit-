<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Dashboard | Ultraze V2</title>
</head>
<body class="bg-[#fff9fa] flex min-h-screen text-[#880e4f] overflow-x-hidden">

    <aside class="w-[280px] bg-white border-r border-pink-50 flex flex-col fixed h-full z-50">
        <div class="p-10 mb-8">
            <h1 class="text-[#f06292] text-2xl font-black italic">ULTRAZE V2</h1>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="/dashboard" class="block p-4 bg-pink-50 text-[#ad1457] font-bold rounded-2xl">Dashboard</a>
            <a href="#" class="block p-4 text-gray-400 font-bold hover:bg-pink-50 rounded-2xl transition">Ventes</a>
            <a href="#" class="block p-4 text-gray-400 font-bold hover:bg-pink-50 rounded-2xl transition">Utilisateurs</a>
        </nav>
        <div class="p-8 border-t border-pink-50">
            <a href="/logout" class="text-xs font-bold text-gray-300 uppercase">Déconnexion</a>
        </div>
    </aside>

    <main class="ml-[280px] flex-1 p-16">
        <header class="mb-12 flex justify-between items-end">
            <div>
                <h2 class="text-4xl font-light">Bienvenue, <span class="font-black italic text-[#ad1457]">{{ user.name }}</span></h2>
                <p class="text-pink-300 text-[10px] font-bold uppercase tracking-widest mt-2">{{ user.entreprise }}</p>
            </div>
            <div class="bg-pink-500 text-white p-3 rounded-2xl shadow-lg">👑</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white p-10 rounded-[45px] shadow-xl shadow-pink-100/50 border border-pink-50">
                <p class="text-[10px] font-bold text-pink-300 uppercase mb-4 tracking-widest">Chiffre d'Affaires</p>
                <h3 class="text-5xl font-black text-[#ad1457] italic">{{ stats.ca }} $</h3>
            </div>
            <div class="bg-white p-10 rounded-[45px] shadow-xl shadow-pink-100/50 border border-pink-50">
                <p class="text-[10px] font-bold text-pink-300 uppercase mb-4 tracking-widest">Taxes IRS</p>
                <h3 class="text-5xl font-black text-red-400 italic">{{ stats.taxes }} $</h3>
            </div>
            <div class="bg-gradient-to-br from-[#f06292] to-[#ec407a] p-10 rounded-[45px] text-white shadow-xl shadow-pink-200">
                <p class="text-[10px] font-bold opacity-70 uppercase mb-4 tracking-widest">Bénéfice Réel</p>
                <h3 class="text-5xl font-black italic">{{ stats.benefice }} $</h3>
            </div>
        </div>
    </main>
</body>
</html>
