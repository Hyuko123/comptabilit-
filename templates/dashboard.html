<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Dashboard | Ultraze V2</title>
</head>
<body class="bg-[#fff9fa] flex min-h-screen text-[#880e4f] overflow-x-hidden">

    <main class="ml-[280px] flex-1 p-16">
        <header class="mb-16 flex justify-between items-start">
            <div>
                <p class="text-[11px] font-black text-pink-300 uppercase tracking-[4px] mb-2 italic">Premium Management</p>
                <h2 class="text-5xl font-light">Bienvenue, <span class="font-black italic text-[#f06292]">Admin</span></h2>
            </div>
            <div class="text-right">
                <div class="bg-white border border-pink-50 px-6 py-3 rounded-2xl shadow-sm">
                    <p class="text-[10px] font-bold text-pink-300 uppercase italic">Session Active</p>
                    <p class="text-[#ad1457] font-black text-sm uppercase">{{ user.entreprise }}</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white p-10 rounded-[45px] shadow-xl shadow-pink-100/50 border border-pink-50">
                <p class="text-[10px] font-bold text-pink-200 uppercase mb-4 tracking-widest">Chiffre d'Affaires</p>
                <h3 class="text-5xl font-black text-[#ad1457] italic">{{ stats.ca }} <span class="text-xl">$</span></h3>
            </div>
            <div class="bg-white p-10 rounded-[45px] shadow-xl shadow-pink-100/50 border border-pink-50">
                <p class="text-[10px] font-bold text-pink-200 uppercase mb-4 tracking-widest">Provision IRS</p>
                <h3 class="text-5xl font-black text-red-400 italic">{{ stats.taxes }} <span class="text-xl">$</span></h3>
            </div>
            <div class="bg-gradient-to-br from-[#f06292] to-[#ec407a] p-10 rounded-[45px] text-white shadow-2xl shadow-pink-200 border-none">
                <p class="text-[10px] font-bold opacity-60 uppercase mb-4 tracking-widest">Bénéfice Net</p>
                <h3 class="text-5xl font-black italic">{{ stats.benefice }} <span class="text-xl opacity-40">$</span></h3>
            </div>
        </div>
    </main>
</body>
</html>
