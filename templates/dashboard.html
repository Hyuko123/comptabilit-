<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Dashboard | Ultraze V2</title>
    <style>
        body { background-color: #fffafb; color: #880e4f; font-family: sans-serif; }
        .sidebar { background: white; border-right: 1px solid #fce4ec; width: 280px; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 15px 25px; color: #ad1457; font-weight: 600; transition: all 0.3s; border-radius: 20px; margin: 5px 15px; }
        .nav-item:hover { background: #fff1f5; transform: translateX(8px); }
        .active { background: #fce4ec; color: #c2185b; }
        .stat-card { background: white; border: 1px solid #fce4ec; border-radius: 35px; transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="sidebar flex flex-col py-8 shadow-sm">
        <div class="px-8 mb-12">
            <h2 class="text-2xl font-black text-[#f06292] italic tracking-tighter">ULTRAZE <span class="text-pink-200 font-light text-lg">V2</span></h2>
        </div>

        <nav class="flex-1">
            <a href="/dashboard" class="nav-item active"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            <a href="/ventes" class="nav-item"><i class="fa-solid fa-receipt"></i> Ventes</a>
            <a href="/salaires" class="nav-item"><i class="fa-solid fa-wallet"></i> Salaires</a>
            <a href="/utilisateurs" class="nav-item"><i class="fa-solid fa-user-group"></i> Utilisateurs</a>
            <a href="/types-ventes" class="nav-item"><i class="fa-solid fa-tags"></i> Types de ventes</a>
            
            <div class="my-6 mx-8 border-t border-pink-50"></div>
            
            <a href="/clotures" class="nav-item text-pink-400"><i class="fa-solid fa-calendar-check"></i> Taxes / Clôtures</a>
            <a href="/irs" class="nav-item text-red-400"><i class="fa-solid fa-circle-exclamation"></i> Avertissement IRS</a>
        </nav>

        <div class="px-8 mt-auto">
            <a href="/logout" class="flex items-center gap-2 text-xs font-bold text-gray-400 hover:text-red-500 uppercase tracking-widest transition-colors">
                <i class="fa-solid fa-power-off"></i> Déconnexion
            </a>
        </div>
    </aside>

    <main class="flex-1 p-12 overflow-y-auto">
        <header class="flex justify-between items-center mb-16">
            <div>
                <h1 class="text-4xl font-light">Bienvenue, <span class="font-bold text-[#ad1457]">Admin</span></h1>
                <p class="text-pink-300 text-xs mt-2 uppercase tracking-[3px]">Pilotage financier : Shinoza Corporate</p>
            </div>
            <div class="flex items-center gap-4 bg-white p-2 rounded-full border border-pink-50 shadow-sm px-6">
                <span class="text-[10px] font-bold text-pink-800 tracking-tighter">STATUS : OPÉRATIONNEL</span>
                <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="stat-card p-10 shadow-pink-100 shadow-xl">
                <p class="text-pink-300 text-[10px] font-bold uppercase tracking-widest mb-4">Chiffre d'Affaires Hebdo</p>
                <h3 class="text-5xl font-light">0.00 <span class="text-xl text-pink-100">$</span></h3>
            </div>
            <div class="stat-card p-10 bg-gradient-to-br from-[#f06292] to-[#ec407a] text-white border-none shadow-xl shadow-pink-200">
                <p class="opacity-70 text-[10px] font-bold uppercase tracking-widest mb-4 text-white">Bénéfice Réel</p>
                <h3 class="text-5xl font-bold italic">0.00 <span class="text-xl opacity-40">$</span></h3>
            </div>
            <div class="stat-card p-10">
                <p class="text-pink-300 text-[10px] font-bold uppercase tracking-widest mb-4">Taxes Provisionnées</p>
                <h3 class="text-5xl font-light text-red-300">0.00 <span class="text-xl text-pink-100">$</span></h3>
            </div>
        </div>
    </main>
</body>
</html>
