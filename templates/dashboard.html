<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><script src="https://cdn.tailwindcss.com"></script>
    <title>Dashboard | Ultraze V2</title>
</head>
<body class="bg-[#fff9fa] flex min-h-screen text-[#880e4f]">
    <main class="ml-80 flex-1 p-16">
        <header class="mb-12">
            <h2 class="text-4xl font-light">Bienvenue, <span class="font-black italic text-[#ad1457]">{{ user.name }}</span></h2>
            <p class="text-pink-300 text-xs font-bold uppercase mt-2 tracking-widest italic">{{ user.entreprise }}</p>
        </header>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white p-10 rounded-[45px] shadow-xl shadow-pink-100/50 border border-pink-50">
                <p class="text-[10px] font-bold text-pink-300 uppercase mb-4 tracking-widest">CA Net</p>
                <h3 class="text-5xl font-black text-[#ad1457] italic">{{ stats.ca }} $</h3>
            </div>
            <div class="bg-white p-10 rounded-[45px] shadow-xl shadow-pink-100/50 border border-pink-50">
                <p class="text-[10px] font-bold text-pink-300 uppercase mb-4 tracking-widest">Taxes IRS</p>
                <h3 class="text-5xl font-black text-red-400 italic">{{ stats.taxes }} $</h3>
            </div>
            <div class="bg-gradient-to-br from-[#f06292] to-[#ec407a] p-10 rounded-[45px] text-white">
                <p class="text-[10px] font-bold opacity-70 uppercase mb-4 tracking-widest">Bénéfice</p>
                <h3 class="text-5xl font-black italic">{{ stats.benefice }} $</h3>
            </div>
        </div>
    </main>
</body>
</html>
