<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Ultraze V2 - Luxe Dashboard</title>
    <style>
        body { background-color: #fff9fa; color: #880e4f; }
        .sidebar { background: white; border-right: 1px solid #fce4ec; }
        .nav-link { color: #ad1457; transition: all 0.3s; border-radius: 15px; }
        .nav-link:hover { background: #fce4ec; color: #880e4f; transform: translateX(5px); }
        .stat-card { background: white; border: 1px solid #fce4ec; border-radius: 30px; box-shadow: 0 10px 30px rgba(240, 98, 146, 0.05); }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 sidebar p-8 flex flex-col">
        <div class="mb-12 px-2">
            <h2 class="text-2xl font-black text-[#f06292] italic">ULTRAZE <span class="text-pink-300 font-light text-lg">V2</span></h2>
        </div>

        <nav class="flex-1 space-y-2">
            <a href="/dashboard" class="nav-link flex items-center gap-4 p-4 font-semibold bg-pink-50">
                <i class="fa-solid fa-house"></i> Dashboard
            </a>
            <a href="/ventes" class="nav-link flex items-center gap-4 p-4">
                <i class="fa-solid fa-receipt"></i> Ventes
            </a>
            <a href="/salaires" class="nav-link flex items-center gap-4 p-4">
                <i class="fa-solid fa-wallet"></i> Salaires
            </a>
            <a href="/utilisateurs" class="nav-link flex items-center gap-4 p-4">
                <i class="fa-solid fa-users"></i> Utilisateurs
            </a>
            <a href="/types-ventes" class="nav-link flex items-center gap-4 p-4">
                <i class="fa-solid fa-tags"></i> Types de ventes
            </a>
            <div class="my-6 border-t border-pink-50"></div>
            <a href="/clotures" class="nav-link flex items-center gap-4 p-4 text-pink-400">
                <i class="fa-solid fa-calendar-check"></i> Taxes / Clôtures
            </a>
            <a href="/irs" class="nav-link flex items-center gap-4 p-4 text-red-400">
                <i class="fa-solid fa-triangle-exclamation"></i> Alertes IRS
            </a>
        </nav>

        <a href="/" class="p-4 text-gray-400 hover:text-red-500 text-sm flex items-center gap-2">
            <i class="fa-solid fa-power-off"></i> Déconnexion
        </a>
    </aside>

    <main class="flex-1 p-12">
        <header class="flex justify-between items-center mb-16">
            <h1 class="text-4xl font-light text-[#880e4f]">Bonjour, <span class="font-bold">Admin</span></h1>
            <div class="bg-white px-6 py-3 rounded-full border border-pink-100 flex items-center gap-3">
                <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
                <span class="text-xs font-bold uppercase tracking-widest text-pink-800">Serveur Live</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="stat-card p-10">
                <p class="text-pink-300 text-xs font-bold uppercase tracking-widest mb-4">Chiffre d'Affaires</p>
                <h3 class="text-5xl font-light text-[#880e4f]">0.00 <span class="text-xl text-pink-200">$</span></h3>
            </div>
            <div class="stat-card p-10 bg-gradient-to-br from-pink-500 to-pink-600 text-white border-none">
                <p class="text-pink-100 text-xs font-bold uppercase tracking-widest mb-4">Bénéfice Net</p>
                <h3 class="text-5xl font-bold italic">0.00 <span class="text-xl opacity-50">$</span></h3>
            </div>
            <div class="stat-card p-10">
                <p class="text-pink-300 text-xs font-bold uppercase tracking-widest mb-4">Provision IRS</p>
                <h3 class="text-5xl font-light text-red-400">0.00 <span class="text-xl text-pink-200">$</span></h3>
            </div>
        </div>
    </main>
</body>
</html>
