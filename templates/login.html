<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Ultraze V2 - Connexion</title>
</head>
<body class="bg-[#0b0e14] flex items-center justify-center min-h-screen font-sans">
    <div class="bg-[#161b22] rounded-3xl overflow-hidden flex max-w-4xl w-full shadow-[0_0_50px_rgba(56,189,248,0.15)] border border-gray-800">
        <div class="w-1/2 p-12 bg-gradient-to-br from-[#0ea5e9] to-[#2563eb] hidden md:flex flex-col justify-between">
            <div>
                <h1 class="text-4xl font-bold text-white leading-tight">Ultraze V2</h1>
                <p class="text-sky-100 mt-4">Le futur de votre comptabilité commence ici.</p>
            </div>
            <div class="text-sky-200 text-sm">© 2026 Ultraze Business Solution</div>
        </div>
        
        <div class="w-full md:w-1/2 p-12">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold text-white">Connexion</h2>
                <i class="fa-solid fa-shield-halved text-sky-400 text-2xl"></i>
            </div>
            
            <form action="/login" method="POST" class="space-y-6">
                <div>
                    <label class="text-gray-400 text-sm block mb-2">Identifiant</label>
                    <input type="text" name="username" required class="w-full bg-[#0b0e14] border border-gray-700 rounded-xl p-4 text-white focus:border-sky-500 outline-none transition">
                </div>
                <div>
                    <label class="text-gray-400 text-sm block mb-2">Mot de passe</label>
                    <input type="password" name="password" required class="w-full bg-[#0b0e14] border border-gray-700 rounded-xl p-4 text-white focus:border-sky-500 outline-none transition">
                </div>
                <button type="submit" class="w-full bg-sky-500 hover:bg-sky-400 text-black font-bold py-4 rounded-xl shadow-lg shadow-sky-500/20 transition-all transform hover:scale-[1.02]">
                    Se connecter
                </button>
            </form>
        </div>
    </div>
</body>
</html>
