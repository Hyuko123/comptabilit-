<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Ultraze V2 - Connexion</title>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-[#fff5f7]">
    <div class="bg-white/80 backdrop-blur-md p-12 rounded-[50px] shadow-2xl w-full max-w-md border border-pink-100 text-center">
        <h1 class="text-4xl font-black text-[#ad1457] italic mb-2">ULTRAZE <span class="font-light">V2</span></h1>
        <p class="text-pink-600 text-[11px] uppercase tracking-[3px] font-bold">Système de gestion des entreprises</p>
        <div class="h-[1px] w-16 bg-pink-200 mx-auto my-6"></div>
        <p class="text-pink-400 text-xs italic mb-8">Fondée par <span class="font-bold text-pink-600">Shinoza</span></p>

        <form action="/login_process" method="POST" class="space-y-6">
            <input type="text" name="username" placeholder="Identifiant" required 
                class="w-full p-4 rounded-2xl border border-pink-50 bg-white focus:border-pink-400 outline-none transition-all">
            <input type="password" name="password" placeholder="Mot de passe" required 
                class="w-full p-4 rounded-2xl border border-pink-50 bg-white focus:border-pink-400 outline-none transition-all">
            <button type="submit" class="w-full bg-[#f06292] hover:bg-[#ec407a] text-white font-bold py-4 rounded-2xl shadow-lg transition-all transform hover:scale-[1.02]">
                Accéder au Système
            </button>
        </form>
    </div>
</body>
</html>
