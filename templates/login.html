<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Ultraze V2 - Connexion</title>
    <style>
        body { background: linear-gradient(135deg, #fff5f7 0%, #fce4ec 100%); }
        .login-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #f8bbd0; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="login-card p-10 rounded-[40px] shadow-2xl w-full max-w-md text-center">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-[#ad1457] tracking-tighter">ULTRAZE <span class="font-light">V2</span></h1>
            <p class="text-pink-400 text-sm mt-2">Gestion d'entreprise haut de gamme</p>
        </div>
        
        <form action="/login_process" method="POST" class="space-y-6">
            <input type="text" name="username" placeholder="Identifiant" required class="w-full p-4 rounded-2xl border border-pink-100 outline-none focus:border-pink-400 transition-all bg-white/50 text-pink-900">
            <input type="password" name="password" placeholder="Mot de passe" required class="w-full p-4 rounded-2xl border border-pink-100 outline-none focus:border-pink-400 transition-all bg-white/50 text-pink-900">
            <button type="submit" class="w-full bg-[#f06292] hover:bg-[#ec407a] text-white font-bold py-4 rounded-2xl shadow-lg transition-transform active:scale-95">
                Accéder au Dashboard
            </button>
        </form>
        <p class="mt-8 text-xs text-pink-300 uppercase tracking-widest italic">Luxury Management System</p>
    </div>
</body>
</html>
