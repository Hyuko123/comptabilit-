<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><script src="https://cdn.tailwindcss.com"></script>
    <title>Ventes | Ultraze V2</title>
</head>
<body class="bg-[#fff9fa] flex min-h-screen">
    <main class="ml-80 flex-1 p-16">
        <h2 class="text-3xl font-light text-[#880e4f] mb-12 italic">Nouvelle <span class="font-black text-pink-500">Facturation</span></h2>
        <div class="max-w-2xl bg-white p-12 rounded-[50px] shadow-2xl shadow-pink-100 border border-pink-50">
            <form class="space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="text-[10px] font-bold text-pink-300 uppercase px-2">Produit</label>
                        <select class="w-full p-4 rounded-2xl bg-pink-50/50 border-none outline-none mt-2">
                            <option>Menu Classique</option><option>Vente Boutique</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-pink-300 uppercase px-2">Montant Brut ($)</label>
                        <input type="number" placeholder="0" class="w-full p-4 rounded-2xl bg-pink-50/50 border-none outline-none mt-2">
                    </div>
                </div>
                <button class="w-full bg-[#f06292] text-white font-bold py-5 rounded-[25px] shadow-lg">Enregistrer le contrat</button>
            </form>
        </div>
    </main>
</body>
</html>
