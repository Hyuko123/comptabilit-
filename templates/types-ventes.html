<main class="ml-72 flex-1 p-12">
    <header class="mb-12">
        <h2 class="text-4xl font-light">Gestion du <span class="font-black italic text-[#f06292]">Stock</span></h2>
    </header>

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-10">
        <div class="bg-white p-10 rounded-[45px] shadow-xl border border-pink-50 h-fit">
            <h3 class="text-xl font-black mb-8 italic text-[#ad1457]">Nouvel Article</h3>
            <form action="/add_to_catalog" method="POST" class="space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-pink-300 uppercase px-2 italic">Nom de l'objet</label>
                    <input type="text" name="item_name" placeholder="ex: Kit de réparation" required class="w-full p-4 rounded-2xl bg-pink-50/50 border-none outline-none mt-1 font-bold text-[#ad1457]">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-pink-300 uppercase px-2 italic">Prix ($)</label>
                        <input type="number" name="item_price" placeholder="500" required class="w-full p-4 rounded-2xl bg-pink-50/50 border-none outline-none mt-1 font-bold">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-pink-300 uppercase px-2 italic">Stock initial</label>
                        <input type="number" name="item_stock" placeholder="10" required class="w-full p-4 rounded-2xl bg-pink-50/50 border-none outline-none mt-1 font-bold">
                    </div>
                </div>
                <button type="submit" class="w-full bg-[#f06292] text-white font-black py-5 rounded-2xl shadow-lg shadow-pink-100 hover:scale-[1.02] transition uppercase tracking-widest">
                    AJOUTER AU COMMERCE
                </button>
            </form>
        </div>

        <div class="xl:col-span-2 bg-white p-10 rounded-[45px] shadow-xl border border-pink-50">
            <h3 class="text-xl font-black mb-8 italic text-[#ad1457]">Inventaire</h3>
            <div class="space-y-4">
                {% for item in catalogue %}
                <div class="flex items-center justify-between p-6 bg-pink-50/20 rounded-3xl border border-pink-50 group hover:bg-pink-50/40 transition">
                    <div>
                        <p class="font-black text-[#ad1457] text-lg">{{ item.nom }}</p>
                        <p class="text-xs font-bold text-pink-300 uppercase tracking-widest">{{ item.prix }}$ / unité</p>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="text-center">
                            <p class="text-[10px] font-bold text-gray-400 uppercase">Quantité</p>
                            <p class="text-2xl font-black text-[#f06292]">{{ item.stock }}</p>
                        </div>
                        <div class="flex gap-2">
                            <a href="/update_stock/{{ item.nom }}/remove" class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm text-red-400 font-bold hover:bg-red-500 hover:text-white transition">-</a>
                            <a href="/update_stock/{{ item.nom }}/add" class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm text-green-400 font-bold hover:bg-green-500 hover:text-white transition">+</a>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</main>
