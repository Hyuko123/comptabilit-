<main class="ml-72 flex-1 p-12">
    <header class="mb-12">
        <h2 class="text-4xl font-light">Gestion du <span class="font-black italic text-[#f06292]">Catalogue & Stocks</span></h2>
    </header>

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-10">
        
        <div class="bg-white p-10 rounded-[45px] shadow-xl border border-pink-50 h-fit">
            <h3 class="text-xl font-black mb-8 italic text-[#ad1457]">Nouvel Article</h3>
            <form action="/add_to_catalog" method="POST" class="space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-pink-300 uppercase px-2">Nom de l'objet</label>
                    <input type="text" name="item_name" placeholder="ex: Kit de réparation" required class="w-full p-4 rounded-2xl bg-pink-50/50 border-none outline-none mt-1 font-bold text-[#ad1457]">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-pink-300 uppercase px-2">Prix ($)</label>
                        <input type="number" name="item_price" placeholder="500" required class="w-full p-4 rounded-2xl bg-pink-50/50 border-none outline-none mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-pink-300 uppercase px-2">Stock Initial</label>
                        <input type="number" name="item_stock" placeholder="50" required class="w-full p-4 rounded-2xl bg-pink-50/50 border-none outline-none mt-1">
                    </div>
                </div>
                <button type="submit" class="w-full bg-[#f06292] text-white font-black py-5 rounded-2xl shadow-lg shadow-pink-100 hover:scale-[1.02] transition uppercase tracking-widest">
                    Ajouter au commerce
                </button>
            </form>
        </div>

        <div class="xl:col-span-2 bg-white p-10 rounded-[45px] shadow-xl border border-pink-50">
            <h3 class="text-xl font-black mb-8 italic text-[#ad1457]">Inventaire en temps réel</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                {% for item in catalogue %}
                <div class="flex items-center justify-between p-6 bg-pink-50/30 rounded-3xl border border-pink-50">
                    <div>
                        <p class="font-black text-[#ad1457]">{{ item.nom }}</p>
                        <p class="text-xs text-pink-300 font-bold uppercase">{{ item.prix }}$ / unité</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right">
                            <p class="text-[10px] font-bold text-gray-400 uppercase">En stock</p>
                            <p class="text-xl font-black {% if item.stock < 10 %}text-red-400{% else %}text-[#f06292]{% endif %}">
                                {{ item.stock }}
                            </p>
                        </div>
                        <div class="flex flex-col gap-1">
                            <form action="/update_stock/{{ item.nom }}/add" method="POST">
                                <button class="bg-white p-1 rounded-lg shadow-sm hover:bg-green-50 text-green-500">+</button>
                            </form>
                            <form action="/update_stock/{{ item.nom }}/remove" method="POST">
                                <button class="bg-white p-1 rounded-lg shadow-sm hover:bg-red-50 text-red-400">-</button>
                            </form>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</main>
