<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><script src="https://cdn.tailwindcss.com"></script>
    <title>Utilisateurs | Ultraze</title>
</head>
<body class="bg-[#fff9fa] flex min-h-screen">
    <main class="ml-72 flex-1 p-16">
        <h2 class="text-4xl font-light text-[#880e4f] mb-12 italic">Gestion <span class="font-black text-[#f06292]">Admin</span></h2>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div class="bg-white p-10 rounded-[40px] shadow-xl border border-pink-50">
                <h3 class="font-black mb-6 italic">Créer un membre</h3>
                <form action="/add_user" method="POST" class="space-y-4">
                    <input type="text" name="new_name" placeholder="Nom Complet" class="w-full p-4 rounded-2xl bg-pink-50 border-none outline-none">
                    <select name="new_entreprise" class="w-full p-4 rounded-2xl bg-pink-50 border-none">{% for ent in entreprises %}<option>{{ ent }}</option>{% endfor %}</select>
                    <button class="w-full bg-[#f06292] text-white font-bold py-4 rounded-2xl shadow-lg">CRÉER LE COMPTE</button>
                </form>
            </div>
            <div class="space-y-4">
                {% for u, d in all_users.items() %}<div class="bg-white p-6 rounded-3xl border border-pink-50 font-bold text-[#ad1457] italic shadow-sm">{{ d.name }} — {{ d.role }}</div>{% endfor %}
            </div>
        </div>
    </main>
</body>
</html>
