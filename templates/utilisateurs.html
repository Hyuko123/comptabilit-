<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Utilisateurs | Ultraze V2</title>
</head>
<body class="bg-[#fff9fa] flex min-h-screen">
    <main class="flex-1 p-12">
        <h1 class="text-3xl font-bold text-[#ad1457] mb-10 italic">Gestion des <span class="text-pink-400">Effectifs</span></h1>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <div class="bg-white p-8 rounded-[40px] shadow-xl border border-pink-100">
                <h2 class="text-xl font-bold text-pink-800 mb-6 uppercase tracking-tighter">Créer un nouveau compte</h2>
                <form action="/add_user" method="POST" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" name="new_name" placeholder="Nom Complet" class="p-4 rounded-2xl bg-pink-50/50 border-none outline-none w-full" required>
                        <input type="text" name="new_username" placeholder="Identifiant" class="p-4 rounded-2xl bg-pink-50/50 border-none outline-none w-full" required>
                    </div>
                    <input type="password" name="new_password" placeholder="Mot de passe" class="p-4 rounded-2xl bg-pink-50/50 border-none outline-none w-full" required>
                    
                    <label class="block text-xs font-bold text-pink-300 uppercase px-2">Entreprise rattachée</label>
                    <select name="new_entreprise" class="w-full p-4 rounded-2xl bg-pink-50 border-none outline-none appearance-none">
                        {% for ent in entreprises %}
                        <option value="{{ ent }}">{{ ent }}</option>
                        {% endfor %}
                    </select>

                    <label class="block text-xs font-bold text-pink-300 uppercase px-2">Grade Hiérarchique</label>
                    <div class="grid grid-cols-2 gap-2">
                        {% for role in ['Patron', 'Co patron', 'Manager', 'Employé expérimenté', 'Employé'] %}
                        <label class="flex items-center gap-3 p-3 rounded-xl border border-pink-50 cursor-pointer hover:bg-pink-50 transition-all">
                            <input type="radio" name="new_role" value="{{ role }}" class="accent-pink-500" required>
                            <span class="text-xs font-bold text-pink-800">{{ role }}</span>
                        </label>
                        {% endfor %}
                    </div>

                    <button type="submit" class="w-full bg-[#f06292] text-white font-bold py-4 rounded-2xl shadow-lg mt-4">Enregistrer le membre</button>
                </form>
            </div>

            <div class="bg-white p-8 rounded-[40px] shadow-xl border border-pink-100">
                <h2 class="text-xl font-bold text-pink-800 mb-6 uppercase tracking-tighter">Membres Actifs</h2>
                <div class="space-y-4">
                    {% for username, data in all_users.items() %}
                    <div class="flex justify-between items-center p-4 bg-pink-50/30 rounded-2xl border border-pink-50">
                        <div>
                            <p class="font-bold text-[#ad1457]">{{ data.name }} <span class="text-[10px] text-pink-300 ml-2">@{{ username }}</span></p>
                            <p class="text-[10px] uppercase font-black text-pink-400">{{ data.entreprise }} — {{ data.role }}</p>
                        </div>
                        <button class="text-red-300 hover:text-red-500"><i class="fa-solid fa-user-minus"></i></button>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </main>
</body>
</html>
