<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Utilisateurs | Ultraze</title>
</head>
<body class="bg-[#fff9fa] flex min-h-screen">
    <main class="ml-72 flex-1 p-16">
        <header class="mb-12">
            <h2 class="text-5xl font-light text-[#880e4f]">Gestion des <span class="font-black italic text-[#f06292]">Membres</span></h2>
        </header>
        
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div class="bg-white p-10 rounded-[40px] shadow-xl border border-pink-50">
                <h3 class="text-[#ad1457] font-black mb-6 italic italic">Créer un profil</h3>
                <form class="space-y-4">
                    <input type="text" placeholder="Nom d'affichage" class="w-full p-4 rounded-2xl bg-pink-50/50 border-none outline-none">
                    <input type="text" placeholder="Identifiant" class="w-full p-4 rounded-2xl bg-pink-50/50 border-none outline-none">
                    <select class="w-full p-4 rounded-2xl bg-pink-50/50 border-none"><option>Employé</option><option>Patron</option></select>
                    <button class="w-full bg-[#f06292] text-white font-bold py-4 rounded-2xl">Créer le compte</button>
                </form>
            </div>
            <div class="space-y-4">
                {% for username, data in all_users.items() %}
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-pink-50 flex justify-between items-center">
                    <div>
                        <p class="font-black text-[#ad1457] italic">{{ data.name }}</p>
                        <p class="text-[10px] text-pink-300 font-bold uppercase">{{ data.role }}</p>
                    </div>
                    <button class="text-red-300 text-xs font-bold border border-red-50 px-4 py-2 rounded-xl hover:bg-red-50 transition-all">Licencier</button>
                </div>
                {% endfor %}
            </div>
        </section>
    </main>
</body>
</html>
